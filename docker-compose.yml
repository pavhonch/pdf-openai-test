services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////app/data/app.db
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "50"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
  backend_uploads:
